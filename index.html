<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
    <div class="container">
        <h1>Task Management System</h1>
        
        <div class="add-task-section">
            <h2>Add New Task</h2>

            <form id="task-input" aria-label="Task Input Form">
                <input type="text" id="title" placeholder="Task Title" aria-label="Task Title">
                <input type="text" id="description" placeholder="Description" aria-label="Description">
                <input type="number" id="priority" min="1" max="3" placeholder="1" aria-label="Priority level, 1 to 3">
                <button type="submit" id="add-task-btn">Add Task</button>
            </form>
        </div>
        
        <div class="task-list" id="task-list">
            <!-- Tasks will be displayed here -->
        </div>
        
        <div class="statistics">
            <!-- Missing: statistics display -->
        </div>
    </div>
    

    <script type="module" src="./src/app.js"></script>
    <script type="module" src="./src/dom.js"></script>
    <script type="module" src="./src/utils.js"></script>
</body>
</html>
